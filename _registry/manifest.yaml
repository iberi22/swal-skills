# Tool aliases mapping for multi-agent support
tool_aliases:
  universal:
    - fs.read
    - fs.write
    - fs.replace
    - fs.search
    - fs.glob
    - shell.run
    - web.fetch

  openclaw:
    fs.read: read
    fs.write: write
    fs.replace: edit
    fs.search: exec
    shell.run: exec
    web.fetch: web_fetch

  codex:
    fs.read: read_file
    fs.write: write_file
    fs.replace: replace
    shell.run: run_shell_command
    web.fetch: web_fetch

  claude:
    fs.read: Read
    fs.write: Write
    fs.replace: Edit
    fs.search: Search
    shell.run: Bash
    web.fetch: WebFetch

  qwen:
    fs.read: read_file
    fs.write: write_file
    fs.replace: replace
    shell.run: run_shell_command
    web.fetch: fetch

  opencode:
    fs.read: read
    fs.write: write
    fs.replace: edit
    shell.run: shell
    web.fetch: browse
